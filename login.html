<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --accent: #20d3b0;
    --accent2: #4d8dff;
    --accent3: #f2b84b;
    --panel: rgba(9, 15, 24, .58);
    --line: rgba(167, 180, 203, .22);
    --text: #edf4ff;
    --muted: #9eacbe;
  }
  body {
    font-family: "Microsoft YaHei UI", "Microsoft YaHei", "Segoe UI", sans-serif;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 40px 24px;
    background:
      radial-gradient(circle at 50% 50%, rgba(32,211,176,.08), transparent 24%),
      linear-gradient(90deg, rgba(3,7,12,.18), rgba(3,7,12,.08) 46%, rgba(3,7,12,.18)),
      url("assets/login-console-bg.png") center / cover no-repeat,
      #070a0f;
    position: relative; overflow: hidden;
  }
  body::before {
    content: ''; position: absolute; inset: 0; pointer-events: none;
    background:
      linear-gradient(90deg, transparent calc(50% - 258px), rgba(32,211,176,.16) calc(50% - 258px), transparent calc(50% - 254px), transparent calc(50% + 254px), rgba(77,141,255,.14) calc(50% + 254px), transparent calc(50% + 258px)),
      radial-gradient(circle at 50% 49%, rgba(32,211,176,.12), transparent 31%);
  }
  body::after {
    content: ''; position: absolute; inset: 0; pointer-events: none;
    background: linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px);
    background-size: 100% 6px; opacity: .22;
  }
  @keyframes float1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(60px,40px)} }
  @keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-50px,-30px)} }
  .login-box {
    position: relative; z-index: 1; width: 400px; max-width: 92vw;
    background:
      linear-gradient(rgba(255,255,255,.028) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.022) 1px, transparent 1px),
      linear-gradient(180deg, rgba(18,27,40,.66), rgba(8,14,23,.54));
    background-size: 28px 28px, 28px 28px, auto;
    backdrop-filter: blur(12px) saturate(1.12);
    border: 1px solid rgba(167,180,203,.24); border-radius: 14px;
    padding: 34px 34px 32px;
    box-shadow:
      0 0 0 1px rgba(32,211,176,.08) inset,
      0 18px 46px rgba(0,0,0,.28);
    overflow: hidden;
  }
  .login-box::before {
    content: ''; position: absolute; inset: 0; pointer-events: none;
    border-radius: inherit;
    background:
      linear-gradient(90deg, var(--accent), transparent 34%, transparent 66%, var(--accent2)) top / 100% 2px no-repeat,
      linear-gradient(90deg, var(--accent), transparent 34%, transparent 66%, var(--accent2)) bottom / 100% 2px no-repeat,
      linear-gradient(180deg, var(--accent), transparent 34%, transparent 66%, var(--accent2)) left / 2px 100% no-repeat,
      linear-gradient(180deg, var(--accent), transparent 34%, transparent 66%, var(--accent2)) right / 2px 100% no-repeat;
    opacity: .78;
  }
  .login-box::after {
    content: 'AUTH NODE';
    position: absolute; right: 22px; top: 18px;
    font-family: Consolas, "Cascadia Mono", monospace;
    font-size: 11px; letter-spacing: .16em; color: rgba(158,172,190,.48);
  }
  .brand { text-align: center; margin-bottom: 28px; padding-top: 6px; }
  .brand .icon {
    width: 56px; height: 56px; margin: 0 auto 14px; border-radius: 13px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center; font-size: 30px;
    box-shadow: 0 0 0 1px rgba(255,255,255,.18) inset, 0 14px 30px rgba(32,211,176,.28);
  }
  .brand h1 { font-size: 20px; color: var(--text); font-weight: 800; letter-spacing: 0; }
  .brand .sub { color: var(--muted); font-size: 13px; margin-top: 6px; }
  .field { margin-bottom: 18px; }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 8px; letter-spacing: .5px; }
  .field input {
    width: 100%; padding: 13px 14px; border: 1px solid rgba(167,180,203,.22);
    border-radius: 7px; font-size: 15px; background: rgba(7,11,17,.48); color: var(--text);
    transition: .2s;
  }
  .field input::placeholder { color: #66758a; }
  .field input:focus {
    outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(32,211,176,.12), 0 0 22px rgba(32,211,176,.08);
    background: rgba(12,19,29,.62);
  }
  .btn {
    width: 100%; padding: 14px; border: none; border-radius: 7px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #06110f; font-size: 15px; font-weight: 800; cursor: pointer; margin-top: 6px;
    transition: .2s; box-shadow: 0 12px 28px rgba(32,211,176,.18); letter-spacing: 2px;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 16px 34px rgba(32,211,176,.32); }
  .btn:active { transform: translateY(0); }
  .err { color: #f87171; font-size: 13px; text-align: center; min-height: 18px; margin-top: 14px; }
  .tip { margin-top: 22px; font-size: 12px; color: #66758a; text-align: center; line-height: 1.7; }

    content: "";

    inset: 0;
    pointer-events: none;
    background:
      linear-gradient(90deg, rgba(36,49,41,.04) 1px, transparent 1px),
      linear-gradient(rgba(36,49,41,.035) 1px, transparent 1px);
    background-size: 44px 44px;
    mask-image: linear-gradient(135deg, transparent, #000 18%, #000 82%, transparent);
  }
  body::after {
    display: none;
  }
  .login-box {
    width: min(430px, calc(100vw - 36px));
    padding: 34px;
    border: 1px solid var(--border);
    border-radius: 24px;
    color: var(--text);
    background: rgba(255,255,255,.88);
    box-shadow: 0 26px 70px rgba(50,65,57,.16);
    backdrop-filter: blur(18px);
  }
  .login-box::before,
  .login-box::after {
    display: none;
  }
  .brand {
    margin-bottom: 26px;
    text-align: left;
  }
  .brand .icon {
    width: 44px;
    height: 44px;
    margin: 0 0 16px;
    border-radius: 15px;
    display: grid;
    place-items: center;
    color: #ffffff;
    background: #243129;
    font-size: 13px;
    font-weight: 900;
    letter-spacing: -.02em;
    box-shadow: none;
  }
  .brand h1 {
    color: var(--text);
    font-size: 27px;
    line-height: 1.15;
    letter-spacing: -.035em;
  }
  .brand .sub {
    margin-top: 8px;
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 0;
  }
  .field {
    margin-bottom: 16px;
  }
  .field label {
    margin-bottom: 8px;
    color: var(--text);
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0;
  }
  .field input {
    min-height: 46px;
    border: 1px solid var(--border);
    border-radius: 14px;
    color: var(--text);
    background: #f7f9f6;
    font-size: 15px;
  }
  .field input::placeholder {
    color: #9aa69f;
  }
  .field input:focus {
    border-color: rgba(82,113,95,.45);
    background: #ffffff;
    box-shadow: 0 0 0 4px rgba(82,113,95,.12);
  }
  .btn {
    min-height: 48px;
    border-radius: 14px;
    color: #ffffff;
    background: #243129;
    font-weight: 900;
    box-shadow: 0 16px 32px rgba(36,49,41,.2);
  }
  .btn:hover {
    transform: translateY(-1px);
    background: #314239;
    box-shadow: 0 20px 38px rgba(36,49,41,.22);
  }
  .btn:active {
    transform: translateY(1px);
  }
  .tip {
    color: var(--muted);
    background: #f3f6f2;
    border: 1px solid var(--border);
    border-radius: 14px;
  }
  .err {
    color: #b85248;
  }
  @media (max-width: 720px) {
    body {
      padding: 18px;
    }
    .login-box {
      padding: 28px 24px;
      border-radius: 20px;
    }
    .brand {
      text-align: left;
    }
    .brand .icon {
      margin-left: 0;
      margin-right: 0;
    }
  }

  /* React Bits component layer */
  .rb-spotlight {
    position: relative;
    isolation: isolate;
    overflow: hidden;
  }
  .rb-spotlight::before {
    content: "";
    position: absolute;
    inset: -1px;
    z-index: 0;
    pointer-events: none;
    opacity: 0;
    background:
      radial-gradient(
        420px circle at var(--rb-x, 50%) var(--rb-y, 50%),
        rgba(82,113,95,.2),
        rgba(185,130,76,.08) 28%,
        transparent 58%
      );
    transition: opacity .22s ease;
  }
  .rb-spotlight:hover::before {
    opacity: 1;
  }
  .rb-spotlight > * {
    position: relative;
    z-index: 1;
  }
  .rb-magnetic {
    transform: translate3d(var(--rb-mx, 0), var(--rb-my, 0), 0);
    transition:
      transform .22s cubic-bezier(.2, .8, .2, 1),
      background .18s ease,
      box-shadow .18s ease;
    will-change: transform;
  }
  .rb-magnetic:active {
    transform: translate3d(var(--rb-mx, 0), calc(var(--rb-my, 0) + 1px), 0) scale(.985);
  }
  .rb-shiny {
    position: relative;
    overflow: hidden;
  }
  .rb-shiny::after {
    content: "";
    position: absolute;
    top: -80%;
    bottom: -80%;
    left: -40%;
    width: 34%;
    pointer-events: none;
    opacity: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,.42), transparent);
    transform: translateX(-120%) rotate(18deg);
  }
  .rb-shiny:hover::after {
    opacity: 1;
    animation: rbShinySweep .82s ease;
  }
  @keyframes rbShinySweep {
    from { transform: translateX(-140%) rotate(18deg); }
    to { transform: translateX(430%) rotate(18deg); }
  }
  @media (prefers-reduced-motion: reduce) {
    .rb-magnetic {
      transform: none !important;
    }
    .rb-shiny:hover::after {
      animation: none !important;
    }
  }
</style>
</head>
<body>
<div class="login-box">
  <div class="brand">
    <div class="icon">GM</div>
    <h1>GM 命令管理工具</h1>
    <div class="sub">GM Command Console</div>
  </div>
  <div class="field">
    <label>用户名 USERNAME</label>
    <input type="text" id="username" placeholder="请输入用户名" autocomplete="username">
  </div>
  <div class="field">
    <label>密码 PASSWORD</label>
    <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password">
  </div>
  <button class="btn" onclick="doLogin()">登 录</button>
  <div class="err" id="err"></div>
  <div class="tip">首次使用默认管理员账号：admin / admin123<br>登录后请尽快修改密码</div>
</div>
<script>
async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const err = document.getElementById('err');
  err.textContent = '';
  if (!username || !password) { err.textContent = '请输入用户名和密码'; return; }
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json();
    if (data.ok) {
      location.href = 'index.html';
    } else {
      err.textContent = data.msg || '登录失败';
    }
  } catch (e) {
    err.textContent = '网络错误，服务器可能未启动';
  }
}
document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('username').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('password').focus(); });

function enhanceReactBitsLogin() {
  const panel = document.querySelector('.login-box');
  if (panel) {
    panel.classList.add('rb-spotlight');
    panel.addEventListener('pointermove', e => {
      const rect = panel.getBoundingClientRect();
      panel.style.setProperty('--rb-x', (((e.clientX - rect.left) / rect.width) * 100).toFixed(2) + '%');
      panel.style.setProperty('--rb-y', (((e.clientY - rect.top) / rect.height) * 100).toFixed(2) + '%');
    });
  }

  document.querySelectorAll('.btn').forEach(btn => {
    btn.classList.add('rb-magnetic', 'rb-shiny');
    btn.addEventListener('pointermove', e => {
      const rect = btn.getBoundingClientRect();
      const dx = (e.clientX - rect.left - rect.width / 2) * 0.08;
      const dy = (e.clientY - rect.top - rect.height / 2) * 0.08;
      btn.style.setProperty('--rb-mx', dx.toFixed(1) + 'px');
      btn.style.setProperty('--rb-my', dy.toFixed(1) + 'px');
    });
    btn.addEventListener('pointerleave', () => {
      btn.style.setProperty('--rb-mx', '0px');
      btn.style.setProperty('--rb-my', '0px');
    });
  });
}
enhanceReactBitsLogin();

(async () => {
  try {
    const res = await fetch('/api/auth/me');
    const data = await res.json();
    if (data.logged_in) location.href = 'index.html';
  } catch (e) {}
})();
</script>
</body>
</html>
