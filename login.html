<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 - GM 命令管理工具</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --accent: #6366f1;
    --accent2: #06b6d4;
  }
  body {
    font-family: -apple-system, "Microsoft YaHei", "Segoe UI", sans-serif;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: #0a0e1a; position: relative; overflow: hidden;
  }
  body::before {
    content: ''; position: absolute; width: 600px; height: 600px; border-radius: 50%;
    background: radial-gradient(circle, rgba(99,102,241,.35), transparent 70%);
    top: -150px; left: -100px; filter: blur(40px); animation: float1 12s ease-in-out infinite;
  }
  body::after {
    content: ''; position: absolute; width: 500px; height: 500px; border-radius: 50%;
    background: radial-gradient(circle, rgba(6,182,212,.3), transparent 70%);
    bottom: -120px; right: -80px; filter: blur(40px); animation: float2 14s ease-in-out infinite;
  }
  @keyframes float1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(60px,40px)} }
  @keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-50px,-30px)} }
  .login-box {
    position: relative; z-index: 1; width: 380px; max-width: 92vw;
    background: rgba(255,255,255,.06); backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,.12); border-radius: 20px;
    padding: 40px 36px; box-shadow: 0 20px 60px rgba(0,0,0,.5);
  }
  .brand { text-align: center; margin-bottom: 30px; }
  .brand .icon {
    width: 60px; height: 60px; margin: 0 auto 14px; border-radius: 16px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center; font-size: 30px;
    box-shadow: 0 8px 24px rgba(99,102,241,.4);
  }
  .brand h1 { font-size: 20px; color: #fff; font-weight: 600; letter-spacing: .5px; }
  .brand .sub { color: #94a3b8; font-size: 13px; margin-top: 6px; }
  .field { margin-bottom: 18px; }
  .field label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 8px; letter-spacing: .5px; }
  .field input {
    width: 100%; padding: 13px 14px; border: 1px solid rgba(255,255,255,.12);
    border-radius: 10px; font-size: 15px; background: rgba(255,255,255,.04); color: #e2e8f0;
    transition: .2s;
  }
  .field input::placeholder { color: #64748b; }
  .field input:focus {
    outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(99,102,241,.2); background: rgba(255,255,255,.07);
  }
  .btn {
    width: 100%; padding: 14px; border: none; border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 6px;
    transition: .2s; box-shadow: 0 8px 24px rgba(99,102,241,.35); letter-spacing: 2px;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(99,102,241,.5); }
  .btn:active { transform: translateY(0); }
  .err { color: #f87171; font-size: 13px; text-align: center; min-height: 18px; margin-top: 14px; }
  .tip { margin-top: 22px; font-size: 12px; color: #64748b; text-align: center; line-height: 1.7; }
</style>
</head>
<body>
<div class="login-box">
  <div class="brand">
    <div class="icon">🎮</div>
    <h1>GM 命令管理工具</h1>
    <div class="sub">GM Command Console</div>
  </div>
  <div class="field">
    <label>用户名 USERNAME</label>
    <input type="text" id="username" placeholder="请输入用户名" autocomplete="username">
  </div>
  <div class="field">
    <label>密码 PASSWORD</label>
    <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password">
  </div>
  <button class="btn" onclick="doLogin()">登 录</button>
  <div class="err" id="err"></div>
  <div class="tip">首次使用默认管理员账号：admin / admin123<br>登录后请尽快修改密码</div>
</div>
<script>
async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const err = document.getElementById('err');
  err.textContent = '';
  if (!username || !password) { err.textContent = '请输入用户名和密码'; return; }
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json();
    if (data.ok) {
      location.href = 'index.html';
    } else {
      err.textContent = data.msg || '登录失败';
    }
  } catch (e) {
    err.textContent = '网络错误，服务器可能未启动';
  }
}
document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
document.getElementById('username').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('password').focus(); });

(async () => {
  try {
    const res = await fetch('/api/auth/me');
    const data = await res.json();
    if (data.logged_in) location.href = 'index.html';
  } catch (e) {}
})();
</script>
</body>
</html>
